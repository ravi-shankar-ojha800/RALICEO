<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="screen-orientation" content="landscape">
    <meta name="orientation" content="landscape">
    <title>RALICEO - Mobile Game Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <style>
    /* Mobile optimizations */
    @media (max-width: 768px) {
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }
        
        .screen {
            width: 100vw;
            height: 100vh;
        }
        
        .game-logo {
            font-size: 48px !important;
        }
        
        .game-btn {
            padding: 16px 40px;
            font-size: 16px;
        }
        
        .games-grid {
            gap: 10px;
            max-width: 320px;
        }
        
        .game-card {
            padding: 15px 10px;
        }
        
        .card-icon {
            font-size: 28px;
        }
        
        .card-title {
            font-size: 10px;
        }
    }
        
        /* Mobile Controls */
        .mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            pointer-events: none;
        }
        
        .mobile-controls.active {
            display: flex;
        }
        
        .dpad {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .control-btn:active, .control-btn.pressed {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.8);
            transform: scale(0.95);
        }
        
        .jump-btn {
            width: 80px;
            height: 80px;
            font-size: 14px;
            background: rgba(255,0,0,0.5);
            border-color: rgba(255,100,100,0.7);
        }
        
        .jump-btn:active, .jump-btn.pressed {
            background: rgba(255,100,100,0.7);
        }
        
        /* Virtual Joystick */
        .joystick-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            display: none;
            z-index: 100;
            pointer-events: auto;
        }
        
        .joystick-container.active {
            display: block;
        }
        
        .joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.3), inset 0 0 30px rgba(255,255,255,0.1);
        }
        
        .joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.4), rgba(255,255,255,0.2));
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }
        
        .joystick-knob.active {
            background: linear-gradient(145deg, rgba(255,255,255,0.6), rgba(255,255,255,0.3));
            border-color: rgba(255,255,255,0.8);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
        }
        
        /* Jump zone button */
        .jump-zone {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,0,0,0.3);
            border: 2px solid rgba(255,100,100,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            z-index: 100;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .jump-zone.active {
            display: flex;
        }
        
        .jump-zone:active, .jump-zone.pressed {
            background: rgba(255,100,100,0.6);
            border-color: rgba(255,255,255,0.8);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <!-- Orientation Warning Screen - Full Black Screen -->
    <div id="orientation-warning" class="screen">
        <div class="rotate-container">
            <div class="rotate-icon">⟳</div>
            <h1 class="rotate-title">ROTATE YOUR SCREEN</h1>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
        <div class="bg-container">
            <div class="bg-image" style="background-image: url('https://i.pinimg.com/originals/13/40/f7/1340f7abca96a2eb48f1416b6dc577d8.gif');"></div>
            <div class="bg-overlay"></div>
        </div>
        <div class="content-wrapper">
            <div class="loading-spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen hidden">
        <div class="bg-container">
            <div class="bg-image" style="background-image: url('https://i.pinimg.com/originals/25/4c/3a/254c3ab0cbf821a1dd0b558c57269238.gif');"></div>
            <div class="bg-overlay"></div>
            <div class="soft-light"></div>
            <div class="fog-layer"></div>
        </div>
        <div class="content-wrapper">
            <h1 class="game-logo">RALICEO</h1>
            <button id="enter-btn" class="game-btn">ENTER</button>
        </div>
    </div>

<!-- Player Name Screen -->
    <div id="name-screen" class="screen hidden">
        <div class="bg-container">
            <div class="bg-image" style="background-image: url('https://i.pinimg.com/originals/13/9b/3b/139b3b57a041f24fb792d94d022baa2c.gif');"></div>
            <div class="bg-overlay"></div>
            <div class="soft-light"></div>
            <div class="fog-layer"></div>
        </div>
        <div class="content-wrapper">
            <h2>ENTER YOUR NAME</h2>
            <input type="text" id="player-name" class="name-input" placeholder="Your name" maxlength="15">
            <p id="name-error" class="error-msg hidden">Name is required. Please enter your name.</p>
            <br>
            <button id="continue-btn" class="game-btn">CONTINUE</button>
        </div>
    </div>

    <!-- Game Selection Menu -->
    <div id="menu-screen" class="screen hidden">
        <div class="bg-container">
            <div class="bg-image" style="background-image: url('https://i.pinimg.com/originals/02/67/d8/0267d8f4a223c9c4f6fe43e20de78d02.gif');"></div>
            <div class="bg-overlay"></div>
            <div class="soft-light"></div>
            <div class="fog-layer"></div>
        </div>
        <div class="content-wrapper">
            <h2 class="menu-title">Select Game</h2>
            <div class="games-grid">
                <div class="game-card" data-game="mumario">
                    <div class="card-icon">🍄</div>
                    <span class="card-title">Mumario</span>
                </div>
                <div class="game-card" data-game="flappybird">
                    <div class="card-icon">🐦</div>
                    <span class="card-title">Flappy Bird</span>
                </div>
            </div>
            <div class="player-info">
                <span id="display-name">Player</span>
            </div>
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="screen hidden">
        <canvas id="game-canvas"></canvas>
        <div class="game-ui">
            <div class="score-display hidden" id="score-display">Score: 0</div>
            <div class="game-info hidden" id="game-info"></div>
        </div>
        
        <!-- NEW: Game Control Buttons (3 buttons only) -->
        <div class="game-controls" id="game-controls">
            <!-- Left side: RUN and BACK buttons -->
            <div class="controls-left">
                <button class="game-control-btn back-btn" id="left-btn">
                    <span class="btn-icon">◀</span>
                    <span class="btn-label">LEFT</span>
                </button>
                <button class="game-control-btn run-btn" id="right-btn">
                    <span class="btn-icon">▶</span>
                    <span class="btn-label">RIGHT</span>
                </button>
            </div>
            <!-- Right side: JUMP button -->
            <div class="controls-right">
                <button class="game-control-btn jump-btn-new" id="jump-btn-new">
                    <span class="btn-icon">⬆</span>
                    <span class="btn-label">JUMP</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen hidden">
        <div class="bg-container">
            <div class="bg-image" style="background-image: url('https://i.pinimg.com/originals/33/45/38/334538ffca9b394cb6410a18e860a447.gif');"></div>
            <div class="bg-overlay"></div>
            <div class="soft-light"></div>
            <div class="fog-layer"></div>
        </div>
        <div class="content-wrapper">
            <h1 class="gameover-title">ITS OVER</h1>
            <p class="final-score" id="final-score">Score: 0</p>
            <div class="gameover-btns">
                <button id="retry-btn" class="game-btn">RETRY</button>
                <button id="menu-btn" class="game-btn">MENU</button>
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="bg-music" loop>
        <source src="https://store.soundeffectgenerator.org/instants/mario-sound-effects/dca11f09-mario.mp3" type="audio/mp3">
    </audio>
    <audio id="click-sound">
        <source src="" type="audio/mp3">
    </audio>
    <audio id="gameover-sound">
        <source src="https://store.soundeffectgenerator.org/instants/death-sound-effect/6ba10759-super-mario-death.mp3" type="audio/mp3">
    </audio>

    <script src="main.js"></script>
    
    <script>
        // Force fullscreen on mobile
        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {});
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }
        
        // Auto request fullscreen on first touch/click
        document.addEventListener('click', function() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                requestFullscreen();
            }
        }, { once: true });
        
        document.addEventListener('touchstart', function() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                requestFullscreen();
            }
        }, { once: true });
        
        // Lock to landscape on mobile
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
        
        // Prevent default touch behaviors
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // Handle orientation change
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                window.scrollTo(0, 0);
            }, 100);
        });
        
        // Mobile Controls Setup
        function setupMobileControls() {
            const mobileControls = document.getElementById('mobile-controls');
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');
            
            // Check if mobile device
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
            
            if (isMobile) {
                mobileControls.classList.add('active');
            }
            
            // Left button
            btnLeft.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                btnLeft.classList.add('pressed');
                window.mumarioKeys.left = true;
            });
            
            btnLeft.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                btnLeft.classList.remove('pressed');
                window.mumarioKeys.left = false;
            });
            
            // Right button
            btnRight.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                btnRight.classList.add('pressed');
                window.mumarioKeys.right = true;
            });
            
            btnRight.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                btnRight.classList.remove('pressed');
                window.mumarioKeys.right = false;
            });
            
            // Jump button
            btnJump.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                btnJump.classList.add('pressed');
                if (gameState.currentGame === 'mumario') {
                    mumarioJump();
                } else if (gameState.currentGame === 'flappybird') {
                    flappyFlap();
                } else if (gameState.currentGame === 'dino') {
                    dinoJump();
                }
            });
            
            btnJump.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                btnJump.classList.remove('pressed');
            });
            
            // Mouse events for testing on desktop
            btnLeft.addEventListener('mousedown', function() {
                window.mumarioKeys.left = true;
            });
            btnLeft.addEventListener('mouseup', function() {
                window.mumarioKeys.left = false;
            });
            btnLeft.addEventListener('mouseleave', function() {
                window.mumarioKeys.left = false;
            });
            
            btnRight.addEventListener('mousedown', function() {
                window.mumarioKeys.right = true;
            });
            btnRight.addEventListener('mouseup', function() {
                window.mumarioKeys.right = false;
            });
            btnRight.addEventListener('mouseleave', function() {
                window.mumarioKeys.right = false;
            });
            
            btnJump.addEventListener('mousedown', function() {
                btnJump.classList.add('pressed');
                if (gameState.currentGame === 'mumario') {
                    mumarioJump();
                } else if (gameState.currentGame === 'flappybird') {
                    flappyFlap();
                } else if (gameState.currentGame === 'dino') {
                    dinoJump();
                }
            });
            
            btnJump.addEventListener('mouseup', function() {
                btnJump.classList.remove('pressed');
            });
            
            btnJump.addEventListener('mouseleave', function() {
                btnJump.classList.remove('pressed');
            });
        }
        
        // Initialize on load
        setupMobileControls();
    </script>
</body>
</html>
